name: Render Retro CGI Scene

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Compile renderer
      run: |
        gcc -o render render.c -lm -O3 -Wall
    
    - name: Run renderer
      run: |
        ./render > output.ppm
    
    - name: Convert PPM to PNG (using ImageMagick)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        convert output.ppm output.png
    
    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: retro-cgi-scene
        path: output.png
    
    - name: Upload PPM artifact (raw format)
      uses: actions/upload-artifact@v4
      with:
        name: retro-cgi-scene-ppm
        path: output.ppm

name: Build 3DSoft.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install GCC
      run: |
        choco install mingw -y
        echo "C:\mingw64\bin" >> $env:GITHUB_PATH
    
    - name: Compile with GCC
      run: |
        gcc -o 3dsoft.exe 3dsoft.c -lopengl32 -lglu32 -lm -mwindows
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 3dsoft
        path: 3dsoft.exe

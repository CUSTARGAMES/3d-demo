name: Build 3DSoft.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create source file
      run: |
        # Copy the entire 3dsoft.c code into the runner
        curl -o 3dsoft.c https://raw.githubusercontent.com/your-repo/3dsoft.c
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile
      run: |
        cl 3dsoft.c /Fe:3dsoft.exe /link opengl32.lib glu32.lib user32.lib gdi32.lib kernel32.lib /SUBSYSTEM:WINDOWS
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 3dsoft
        path: 3dsoft.exe

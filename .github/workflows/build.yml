name: Build Windows 3D Cube EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install MinGW GCC
      run: |
        choco install mingw -y
        echo "C:\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Verify GCC installation
      run: gcc --version
    
    - name: Compile Windows EXE with MinGW
      run: |
        gcc cube3d_windows.c -o cube3d.exe -lm -lgdi32 -mwindows -O2
    
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: cube3d-windows-exe
        path: cube3d.exe
        retention-days: 30

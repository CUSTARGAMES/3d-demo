name: Build Windows 3D Cube EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Compile Windows EXE
      run: |
        cl cube3d_windows.c /Fe:cube3d.exe user32.lib gdi32.lib
      shell: cmd
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: cube3d-windows-exe
        path: cube3d.exe
        retention-days: 30

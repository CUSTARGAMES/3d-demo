name: Build Phoix Editor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup MinGW
      run: choco install mingw -y
    - name: Compile
      run: gcc -o phoix_editor.exe phoix_editor.c -lopengl32 -lglu32 -lgdi32 -lm -mwindows -O3
    - uses: actions/upload-artifact@v4
      with:
        name: phoix-editor
        path: phoix_editor.exe

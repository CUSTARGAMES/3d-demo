name: Build Retro CGI EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create render.c
      run: |
        # Paste the entire C code above into render.c
        echo "// Paste the code here" > render.c
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile
      run: |
        cl render.c /Fe:retro_cgi.exe /link opengl32.lib glu32.lib user32.lib gdi32.lib
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: retro-cgi.exe
        path: retro_cgi.exe

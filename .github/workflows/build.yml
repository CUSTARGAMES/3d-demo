name: Build DOOM Raycaster

on: [push, workflow_dispatch]

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download SDL2 for Windows
      run: |
        curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.30.0/SDL2-devel-2.30.0-mingw.tar.gz -o SDL2.tar.gz
        tar -xzf SDL2.tar.gz
        echo "SDL2 extracted successfully"
    
    - name: Compile with GCC to create .exe
      run: |
        gcc -o raycaster.exe main.c raycast.c -I./SDL2-2.30.0/x86_64-w64-mingw32/include -L./SDL2-2.30.0/x86_64-w64-mingw32/lib -lSDL2 -lm -Wall -O2
    
    - name: List files (verify .exe exists)
      run: |
        dir *.exe
        echo "Build successful!"
    
    - name: Upload Windows executable
      uses: actions/upload-artifact@v4
      with:
        name: doom-raycaster.exe
        path: raycaster.exe
        retention-days: 90

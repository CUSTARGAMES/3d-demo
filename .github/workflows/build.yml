name: Build C Program

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile C program
      run: |
        cl /Fe:cube3d.exe cube3d.c /link user32.lib
      shell: cmd
    
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: cube3d-windows
        path: cube3d.exe
        retention-days: 30

  build-windows-mingw:
    runs-on: windows-latest
    name: Build with MinGW
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install MinGW
      run: |
        choco install mingw -y
        echo "C:\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Compile with GCC
      run: |
        gcc cube3d.c -o cube3d.exe -lm -Wall -Wextra -O2
    
    - name: Upload MinGW executable
      uses: actions/upload-artifact@v4
      with:
        name: cube3d-mingw
        path: cube3d.exe
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Compile C program
      run: |
        gcc cube3d.c -o cube3d -lm -Wall -Wextra -O2
    
    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: cube3d-linux
        path: cube3d
        retention-days: 30

  release:
    needs: [build-windows, build-windows-mingw, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/cube3d-windows/cube3d.exe
          artifacts/cube3d-mingw/cube3d.exe
          artifacts/cube3d-linux/cube3d
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

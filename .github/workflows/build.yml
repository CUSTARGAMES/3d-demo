name: Build Phoix Suite

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MinGW
      run: |
        choco install mingw -y
        echo "C:\mingw64\bin" >> $env:GITHUB_PATH
    
    - name: Build Phoix 3D Editor
      run: |
        gcc -o phoix_editor.exe phoix_editor.c -lopengl32 -lglu32 -lgdi32 -lm -mwindows -O3 -Wall
    
    - name: Build Phoix Render Engine
      run: |
        gcc -o phoix_renderer.exe phoix_renderer.c -lm -O3 -Wall
    
    - name: Upload all EXEs
      uses: actions/upload-artifact@v4
      with:
        name: phoix-suite
        path: |
          phoix_editor.exe
          phoix_renderer.exe
